{% extends parent_template|default:"thoughts/base_thoughts.html" %}
{% load category_list %}

{% block content %}
    <div class="row h-50">
        <div class="col-sm12 my-auto mx-auto px-5 text-center index-font index-font-big">
        {% with item=object %}
        {% if item %}
        {{ item.thought|safe }}
            <div class="row">
                <div class="col-sm12 mx-auto mb-5 index-font-small">
                    {% if item.author %}<em>{{ item.author|safe }}</em>{% endif %}
                </div>
            </div>
        </div
        {% else %}
            Mintis pakeliui pasiklydo, bandykite paspausti F5.
        {% endif %}
        {% endwith %}

    </div>
    {% category_list all_categories border_position='top' %}
{% endblock %}
