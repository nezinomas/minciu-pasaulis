{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Minčių pasaulis</title>
      <link rel='stylesheet' id='google-font-lora-css'  href='//fonts.googleapis.com/css?family=Lora:400,400italic,700,700italic' type='text/css' media='all' />
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
      <link rel="stylesheet" href="{% static 'css/app.css' %}">

      {% if request.user.is_authenticated %}
      <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
      <script src="{% static 'js/jquery-ui-1.11.3.min.js' %}"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
      <script src="https://unpkg.com/htmx.org@1.7.0"></script>
      <script type="text/javascript" src="{% static 'js/dialog.js' %}"></script>
      {% endif %}

    {% block stylesheet %}{% endblock %}
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-122651582-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-122651582-1');
    </script>
  </head>
  <body>
      <div class="container mx-auto">
        <nav class="navbar navbar-light bg-light sticky-top px-2">
           {% block top_nav %}&nbsp;{% endblock %}
           {% if request.user.is_authenticated %}
           <button class="btn btn-sm btn-success px-3" hx-get="{% url 'thoughts:create' %}" hx-target="#dialog"> Pridėti naują mintį </button>
           {% endif %}
            <form class="d-flex" method="GET" action="{% url 'thoughts:search' %}">
              <!--{% csrf_token %}-->
              <input class="form-control btn-sm mx-2" type="search" placeholder="Ieškoti" aria-label="Ieškoti" size="35" name="q" value="{{ request.GET.q }}">
              <button class="btn btn-sm btn-secondary" type="submit">Ieškoti</button>
            </form>
        </nav>
      {% block content %}{% endblock %}
      </div>
  {% if request.user.is_authenticated %}
    <div id="modal" class="modal fade">
			<div id="dialog" class="modal-dialog" hx-target="this" hx-swap="this"></div>
		</div>
  {% endif %}
  </body>
</html>
